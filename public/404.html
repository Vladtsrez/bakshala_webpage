<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect: preserve the path as a query param,
      // then index.html restores it before React Router boots.
      var base = '/bakshala_webpage';
      var path = window.location.pathname.slice(base.length) || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        base + '/?p=' + encodeURIComponent(path + search) + hash
      );
    </script>
  </head>
  <body></body>
</html>
